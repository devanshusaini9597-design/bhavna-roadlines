# ────────────────────────────────────────────────────────────
#  Bhavna Roadlines — Fly.io app config
#  Region: Mumbai (bom)  ·  Dockerfile-based  ·  Free-tier friendly
# ────────────────────────────────────────────────────────────

app            = "bhavna-roadlines"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV     = "production"
  APP_DEBUG   = "false"
  LOG_CHANNEL = "stack"
  LOG_LEVEL   = "error"
  PORT        = "8080"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0          # Set to 1 if you need zero cold-starts (uses more free hours)
  processes            = ["app"]

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "15s"
    method       = "GET"
    path         = "/up"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"                   # 256mb works but gets tight; 512mb is safer for Laravel
  cpus   = 1

[deploy]
  strategy = "immediate"
