# Apache vhost — listens on ${PORT} (injected by entrypoint)
# The actual `Listen` directive lives in ports.conf (patched by
# docker-entrypoint.sh); duplicating it here would cause a bind error.
# Document root points at Laravel's public/ folder.

<VirtualHost *:${PORT}>
    ServerName _
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Security headers
    Header set X-Content-Type-Options "nosniff"
    Header set X-Frame-Options "SAMEORIGIN"
    Header set Referrer-Policy "strict-origin-when-cross-origin"

    # Trust Railway's proxy for correct HTTPS detection
    SetEnvIf X-Forwarded-Proto "https" HTTPS=on

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
